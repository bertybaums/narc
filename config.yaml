# NARC Configuration
#
# MindRouter subject models for 3-condition testing pipeline.

models:
  - name: gpt-oss-120b
    provider: openai_compat
    endpoint: "https://mindrouter.uidaho.edu/v1"
    model_id: "openai/gpt-oss-120b"
    api_key_env: MINDROUTER_API_KEY
    temperature: 0.0
    max_tokens: 8192
    reasoning_effort: high
    timeout: 300.0
    modality: text
    role: subject

  - name: gpt-oss-20b
    provider: openai_compat
    endpoint: "https://mindrouter.uidaho.edu/v1"
    model_id: "openai/gpt-oss-20b"
    api_key_env: MINDROUTER_API_KEY
    temperature: 0.0
    max_tokens: 4096
    reasoning_effort: high
    timeout: 300.0
