networks:
  narc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.1.0/24

services:
  narc:
    build: .
    ports:
      - "8100:8000"
    volumes:
      - ./narc.db:/app/narc.db
      - ./data:/app/data
      - ./inspect.html:/app/inspect.html
    environment:
      - NARC_SECRET_KEY=${NARC_SECRET_KEY}
      - MINDROUTER_API_KEY=${MINDROUTER_API_KEY}
    networks:
      - narc-net
    restart: unless-stopped
