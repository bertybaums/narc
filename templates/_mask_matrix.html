{# Mask variants & test-matrix editor. Requires `puzzle` (saved, with puzzle_id
   and sequence) in context. Included on the solve page (admin) and the create
   page (edit mode). #}
<div class="card mb-3 border-secondary">
    <div class="card-header py-2"><span class="small text-muted">Mask variants &amp; test matrix</span></div>
    <div class="card-body py-2">
        <div id="mask-list" class="mb-2"></div>
        <div class="row g-1 align-items-center mb-2">
            <div class="col-auto">
                <input id="mask-label" class="form-control form-control-sm" placeholder="label e.g. mask-4" style="width:140px">
            </div>
            <div class="col-auto">
                <input id="mask-pos" class="form-control form-control-sm" placeholder="grids to hide e.g. 4 or 2,3" style="width:190px">
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addMask()">Add mask variant</button>
            </div>
        </div>
        <div id="matrix-wrap" class="table-responsive"></div>
        <div id="matrix-msg" class="small mt-1"></div>
    </div>
</div>
<script>
const MX_PID = "{{ puzzle.puzzle_id }}";
const MX_NGRIDS = {{ puzzle.sequence | length }};
function mxMsg(cls, text) {
    const m = document.getElementById('matrix-msg');
    m.className = 'small mt-1 ' + cls; m.textContent = text;
}
async function loadMatrix() {
    const d = await (await fetch(`/api/puzzles/${MX_PID}/matrix`)).json();
    document.getElementById('mask-list').innerHTML = d.masks.map(m => {
        const pos = m.masked_positions.map(p => '#' + (p + 1)).join(', ');
        const del = m.label === 'original' ? ''
            : ` <a href="#" class="text-danger text-decoration-none" onclick="delMask(${m.mask_variant_id});return false">&times;</a>`;
        return `<span class="badge bg-light text-dark border me-1">${m.label}: ${pos}${del}</span>`;
    }).join('');
    const wrap = document.getElementById('matrix-wrap');
    if (!d.narratives.length || !d.masks.length) { wrap.innerHTML = '<span class="text-muted small">Add a narrative variant and a mask variant to build the matrix.</span>'; return; }
    let h = '<table class="table table-sm table-bordered mb-0"><thead><tr><th class="small text-muted">narrative \\ mask</th>';
    for (const m of d.masks) h += `<th class="small text-center">${m.label}</th>`;
    h += '</tr></thead><tbody>';
    for (const v of d.narratives) {
        h += `<tr><td class="small">${v.variant}</td>`;
        for (const m of d.masks) {
            const on = d.enabled[v.variant_id + ':' + m.mask_variant_id] ? 'checked' : '';
            h += `<td class="text-center"><input type="checkbox" ${on} onchange="toggleCell(${v.variant_id},${m.mask_variant_id},this.checked)"></td>`;
        }
        h += '</tr>';
    }
    document.getElementById('matrix-wrap').innerHTML = h + '</tbody></table>';
}
async function addMask() {
    const label = document.getElementById('mask-label').value.trim();
    const positions = document.getElementById('mask-pos').value.trim()
        .split(',').map(s => parseInt(s.trim(), 10) - 1).filter(n => !isNaN(n));
    if (!label || !positions.length) { mxMsg('text-danger', 'Need a label and grid numbers.'); return; }
    if (positions.some(p => p < 0 || p >= MX_NGRIDS)) { mxMsg('text-danger', `Grid numbers must be 1..${MX_NGRIDS}.`); return; }
    const r = await fetch(`/api/puzzles/${MX_PID}/masks`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({label, masked_positions: positions})
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok) { mxMsg('text-success', 'Mask variant added.'); document.getElementById('mask-label').value = ''; document.getElementById('mask-pos').value = ''; loadMatrix(); }
    else mxMsg('text-danger', d.error || `Failed (HTTP ${r.status}).`);
}
async function delMask(id) {
    const r = await fetch(`/api/puzzles/${MX_PID}/masks/${id}`, {method: 'DELETE'});
    const d = await r.json().catch(() => ({}));
    if (r.ok) { mxMsg('text-success', 'Deleted.'); loadMatrix(); }
    else mxMsg('text-danger', d.error || `Failed (HTTP ${r.status}).`);
}
async function toggleCell(vid, mvid, enabled) {
    const r = await fetch(`/api/puzzles/${MX_PID}/matrix`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({variant_id: vid, mask_variant_id: mvid, enabled})
    });
    if (r.ok) mxMsg('text-success', 'Saved.');
    else mxMsg('text-danger', `Failed (HTTP ${r.status}).`);
}
loadMatrix();
</script>
