<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NARC{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/grids.css">
    <link rel="stylesheet" href="/static/css/narc.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">NARC</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/about">About</a>
                <a class="nav-link" href="/browse">Browse</a>
                <a class="nav-link" href="/create">Create</a>
                <a class="nav-link" href="/inspect">Inspect</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/grids.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
